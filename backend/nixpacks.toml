# Nixpacks build config — pins Python 3.11 (our local + tested version)
# This file lives in backend/ — Railway's Root Directory must be set to "backend"
[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
